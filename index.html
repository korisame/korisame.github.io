<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shaun Gioele — Apps</title>
<meta name="description" content="Apps and projects by Shaun Gioele." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>•</text></svg>" />
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #262626;
    --text: #ededed;
    --muted: #888;
    --accent: #fff;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.5; }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 880px; margin: 0 auto; padding: 80px 24px 120px; }
  header { margin-bottom: 64px; }
  header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
  header p { color: var(--muted); font-size: 16px; max-width: 560px; }
  .socials { margin-top: 16px; display: flex; gap: 16px; font-size: 14px; color: var(--muted); }
  .socials a:hover { color: var(--text); }
  .kofi-btn {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 20px;
    padding: 10px 18px;
    background: #FF5E5B; color: #fff;
    border-radius: 8px;
    font-size: 14px; font-weight: 600;
    transition: transform .15s ease, opacity .15s ease;
  }
  .kofi-btn:hover { transform: translateY(-1px); opacity: .92; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 20px; font-weight: 600; }
  .apps { display: grid; gap: 16px; margin-bottom: 64px; }
  .app {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 20px;
    align-items: center;
    transition: border-color .15s ease, background .15s ease;
  }
  .app:hover { border-color: #3a3a3a; background: var(--surface-2); }
  .app-icon {
    width: 56px; height: 56px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 600;
    border: 1px solid var(--border);
  }
  .app-info h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .app-info p { color: var(--muted); font-size: 14px; }
  .app-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
  }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: #fff; color: #000;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    border: none;
    transition: opacity .15s ease;
  }
  .btn:hover { opacity: .85; }
  .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--surface-2); opacity: 1; }
  .newsletter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }
  .newsletter h3 { font-size: 16px; margin-bottom: 6px; }
  .newsletter p { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  .newsletter form { display: flex; gap: 8px; }
  .newsletter input {
    flex: 1; padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .newsletter input:focus { outline: none; border-color: #555; }
  footer { margin-top: 80px; color: var(--muted); font-size: 13px; text-align: center; }
  @media (max-width: 600px) {
    .container { padding: 48px 20px 80px; }
    header h1 { font-size: 26px; }
    .app { grid-template-columns: 48px 1fr; padding: 18px; }
    .app-icon { width: 48px; height: 48px; font-size: 20px; }
    .actions { grid-column: 1 / -1; justify-content: flex-start; }
    .newsletter form { flex-direction: column; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Shaun Gioele</h1>
      <p>Apps and side projects. Updated occasionally.</p>
      <div class="socials">
        <a href="https://github.com/korisame" target="_blank" rel="noopener">GitHub</a>
        <a href="https://ko-fi.com/shaungori" target="_blank" rel="noopener">Ko-fi</a>
        <a href="mailto:korisame@gmail.com">Email</a>
      </div>
      <a href="https://ko-fi.com/shaungori" target="_blank" rel="noopener" class="kofi-btn">
        <span>☕</span> Support me on Ko-fi
      </a>
    </header>

    <div class="section-title">Apps</div>
    <div class="apps" id="apps-list">
      <!-- populated from apps.json -->
    </div>

    <div class="newsletter">
      <h3>Get update notifications</h3>
      <p>One email per new release. No spam.</p>
      <form action="https://buttondown.email/api/emails/embed-subscribe/shaungioele" method="post" target="popupwindow" onsubmit="window.open('https://buttondown.email/shaungioele', 'popupwindow')">
        <input type="email" name="email" placeholder="you@example.com" required />
        <button type="submit" class="btn">Subscribe</button>
      </form>
    </div>

    <footer>
      &copy; <span id="y"></span> Shaun Gioele
    </footer>
  </div>

<script>
document.getElementById('y').textContent = new Date().getFullYear();

fetch('apps.json')
  .then(r => r.json())
  .then(apps => {
    const list = document.getElementById('apps-list');
    list.innerHTML = apps.map(a => `
      <div class="app">
        <div class="app-icon">${a.iconText || a.name[0]}</div>
        <div class="app-info">
          <h3>${a.name}</h3>
          <p>${a.description}</p>
          <div class="app-meta">
            ${(a.platforms || []).map(p => `<span class="badge">${p}</span>`).join('')}
            ${a.version ? `<span class="badge">v${a.version}</span>` : ''}
          </div>
        </div>
        <div class="actions">
          ${(a.links || []).map(l => `
            <a href="${l.url}" class="btn ${l.primary ? '' : 'secondary'}" ${l.url.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>
              ${l.label}
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  })
  .catch(err => {
    document.getElementById('apps-list').innerHTML =
      '<p style="color:var(--muted);font-size:14px">Edit <code>apps.json</code> to add your apps.</p>';
  });
</script>
</body>
</html>
